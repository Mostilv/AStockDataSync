# MongoDB 配置
mongodb:
  uri: "mongodb://localhost:27017/"

# akshare 配置
akshare:
  db: "akshare_data"
  basic: "stock_basic"
  daily: "daily_adjusted"
  weekly: "weekly_adjusted"
  monthly: "monthly_adjusted"
  minute_5: "minute_5_adjusted"
  source_tag: "akshare"
  history_years: 3
  minute_lookback_days: 30
  frequencies: ["d", "w", "m", "5"]
  sleep_seconds: 2

# Backend synchronization configuration
stock_middle_platform_backend:
  enabled: true
  base_url: "http://localhost:8000"
  api_prefix: "/api/v1"
  username: "admin"
  password: "123456"
  target: "primary"

# workflow 配置
workflow:
  daily_update:
    refresh_basic: true
    akshare:
      enabled: true
      loop_mode: false
      loop_interval_minutes: 30
      frequencies: ["d", "w", "m", "5"]
      full_update: false
      resume: true
      lookback_years: 3
      eod_validation_hour: 20
      schedule:
        weekly: true
        monthly: true
    tagging:
      industry: true
    indicators:
      enabled: true
      collection: "indicator_data"
      run_industry_metrics: true
      run_industry_breadth: true
      industry_metrics_lookback_days: 12
      industry_metrics_momentum: 5
      industry_limit: 28
      industry_codes: []
      breadth_indicator: "industry_breadth_ma20"
      breadth_timeframe: "1d"
      breadth_lookback_days: 60
      breadth_ma_window: 20
      jobs:
        - name: "sse_macd"
          type: "macd"
          symbol: "sh.000001"
          frequency: "d"
          params:
            fast: 12
            slow: 26
            signal: 9
