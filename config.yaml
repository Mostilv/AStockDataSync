mongodb:
  uri: "mongodb://localhost:27017/"
  database: "stock_platform"
  collections:
    stock_basic: "stock_basic"
    stock_kline: "stock_kline"
    sync_meta: "sync_meta"

astock:
  frequencies: ["d", "w", "m"]
  batch_size: 500
  pause_seconds: 0.2
  daily_lookback_days: 180
  maintain_interval_minutes: 60
